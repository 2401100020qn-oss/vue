<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/vue@3.5.0/dist/vue.global.js"></script>
  <title>v-on</title>
</head>
<body>
  <div id="app">
    <button @click="onClick">マウスをクリック</button>
    <p>{{ message }}</p>
  </div>
  <script>
    const appdata = {
      data: () => {
        return {
          message: "クリックしてね！",
        }
      },
      methods: {
        onClick() {
          alert("押された！")
          const date = new Date().toLocaleString('ja-JP')
          this.message = date
        }
      }
    }
    Vue.createApp(appdata).mount('#app')
  </script>
</body>
</html>
