<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>Vue.js のサンプル</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css" >
    <script src="https://unpkg.com/vue@3.5.0/dist/vue.global.js"></script>
  </head>
  <body>
    <style>
        .red{
            font-size: 24px;
            color: red;
        }
        .blue{
            font-size: 24px;
            color: blue;
        }
    </style>

    <h1 class="bg-primary text-white display-4 px-3">Vue3</h1>
    <div id="app" class="bg-secondary text-white display-4 px-3 container">
        <div v-bind:class="{blue: isBlue, red: isRed}">{{message}}</div>
    </div>

    <script>
        const appdata = {
            data() {
                return {
                    message: "カウントスタート",
                    isBlue: true,
                    isRed: false,
                    count: 0
                }
            },
            mounted() {
                setInterval(() => {
                    if (this.count >= 10) {
                        this.count = 0
                        this.isBlue = false
                        this.isRed = true
                        this.message = `カウントリセット`
                    } else {
                        this.count++
                        this.isBlue = true
                        this.isRed = false
                        this.message = `カウント${this.count}秒経過`
                    }
                }, 1000)
            }
        }

        Vue.createApp(appdata).mount('#app')
    </script>
  </body>
</html>
